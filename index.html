<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz DAW - Despliegue</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="contenedor">
    <h1>Quiz de Despliegue de Aplicaciones Web</h1>

    <div class="panel activo" id="panelInicio">
      <div class="fila">
        <button id="btnEmpezar">Empezar test</button>
      </div>
    </div>

    <div class="quiz" id="panelQuiz">
      <div class="info">
        <div class="dato"><strong>Unidad:</strong><br><span id="infoUnidad"></span></div>
        <div class="dato"><strong>Pregunta:</strong><br><span id="infoPregunta"></span></div>
        <div class="dato"><strong>Aciertos:</strong><br><span id="infoAciertos"></span></div>
        <div class="dato"><strong>Total UF:</strong><br><span id="infoTotal"></span></div>
      </div>

      <div class="pregunta" id="textoPregunta"></div>
      <div class="respuestas" id="cajaRespuestas"></div>
      <div class="mensaje" id="mensaje"></div>
    </div>

    <div class="resultado" id="panelResultado">
      <h2>Resultado final</h2>
      <p><strong>Unidad:</strong> <span id="resultadoUnidad"></span></p>
      <p><strong>Aciertos:</strong> <span id="resultadoAciertos"></span></p>
      <p><strong>Total preguntas:</strong> <span id="resultadoTotal"></span></p>
      <p><strong>Nota:</strong> <span id="resultadoNota"></span></p>
      <button id="btnVolver">Volver al inicio</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
